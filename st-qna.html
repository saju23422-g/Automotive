  <meta charset="UTF-8" />

  <title>Starting System MCQ</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }body {
  font-family: 'Hind Siliguri', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  min-height: 100vh;
  color: #fff;
  padding: 30px 15px;
}

.container {
  width: 100%;
  max-width: 1400px;
  margin: auto;
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

.header h1 {
  font-size: 56px;
  font-weight: 700;
  margin-bottom: 10px;
  background: linear-gradient(to right, #38bdf8, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header p {
  color: #cbd5e1;
  font-size: 18px;
}

.stats {
  display: flex;
  justify-content: space-between;
  gap: 15px;
  margin-bottom: 25px;
  flex-wrap: wrap;
}

.card {
  flex: 1;
  min-width: 180px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.card h2 {
  font-size: 30px;
  margin-bottom: 8px;
  color: #38bdf8;
}

.quiz-box {
  min-height: 75vh;
  background: rgba(255,255,255,0.08);
  border-radius: 22px;
  padding: 30px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.1);
}

.question-count {
  color: #94a3b8;
  margin-bottom: 12px;
  font-size: 15px;
}

.question {
  font-size: 38px;
  line-height: 1.6;
  margin-bottom: 25px;
  font-weight: 600;
}

.options {
  display: grid;
  gap: 16px;
}

.option {
  font-size: 24px;
  min-height: 85px;
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.06);
  border: 2px solid transparent;
  padding: 16px 18px;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.25s ease;
  font-size: 18px;
}

.option:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.12);
  border-color: #38bdf8;
}

.option.correct {
  background: rgba(34,197,94,0.2);
  border-color: #22c55e;
}

.option.wrong {
  background: rgba(239,68,68,0.2);
  border-color: #ef4444;
}

.controls {
  margin-top: 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 15px;
  flex-wrap: wrap;
}

button {
  border: none;
  padding: 14px 24px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.25s ease;
}

.next-btn {
  background: linear-gradient(to right, #38bdf8, #6366f1);
  color: white;
}

.next-btn:hover {
  transform: scale(1.04);
}

.restart-btn {
  background: #ef4444;
  color: white;
}

.result {
  text-align: center;
  padding: 30px 10px;
}

.result h2 {
  font-size: 40px;
  margin-bottom: 12px;
  color: #38bdf8;
}

.result p {
  font-size: 22px;
  color: #e2e8f0;
  margin-bottom: 25px;
}

.progress {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 50px;
  overflow: hidden;
  margin-bottom: 25px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(to right, #38bdf8, #6366f1);
  transition: 0.3s;
}

@media (max-width: 768px) {
  .header h1 {
    font-size: 38px;
  }

  .question {
    font-size: 28px;
  }

  .option {
    font-size: 20px;
  }

  .quiz-box {
    padding: 22px;
  }
}


div.copyright{
font-size:10px;
color:green;

.top-bar{ display:flex; justify-content:space-between; align-items:stretch; gap:12px; margin-bottom:20px; flex-wrap:nowrap; } }

.mini-card{ flex:1; max-width:50%; min-width:0; padding:16px 12px; border-radius:20px; background:rgba(255,255,255,0.08); text-align:center; background:rgba(255,255,255,0.08); padding:18px 25px; border-radius:18px; text-align:center; min-width:170px; }

.mini-card span{ font-size:18px; color:#cbd5e1; }

.correct{ background:rgba(34,197,94,0.25); border-color:#22c55e; }

.wrong{ background:rgba(239,68,68,0.3); border-color:#ef4444; }

.bottom-btn{ margin-top:35px; text-align:center; }

.bottom-btn button, .popup-buttons{ position:sticky; bottom:0; background:#111827; padding-top:20px; margin-top:25px; display:flex; justify-content:center; align-items:center;color:white; }

.next-popup-btn{ width:100%; max-width:320px; padding:20px 30px; font-size:26px; font-weight:700; border:none; border-radius:18px; background:linear-gradient(to right,#22c55e,#16a34a); color:white; cursor:pointer; transition:0.25s; box-shadow:0 10px 25px rgba(34,197,94,0.35); }

.next-popup-btn:hover{ transform:scale(1.03); }

.popup-content button{ padding:18px 38px; font-size:22px; border:none; border-radius:18px; background:linear-gradient(to right,#38bdf8,#6366f1); color:white; cursor:pointer; font-weight:700; }

.popup{ position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; padding:20px; z-index:999; }

.popup-content{ max-height:90vh; overflow-y:auto; background:#111827; padding:10px; border-radius:28px; max-width:700px; width:100%; text-align:center; }

.popup-content h2, .result-popup h1{ font-size:42px; margin-bottom:20px; }

.popup-content p{ font-size:24px; line-height:1.7; margin-bottom:30px; }

.final-stats{ display:flex; justify-content:center; gap:40px; margin:35px 0; }

.final-stats div{ background:rgba(255,255,255,0.08); padding:20px 35px; border-radius:20px; }

.final-stats h2{ font-size:48px; }

.wrong-review{ margin-top:30px; text-align:left; }

.wrong-review h3{ font-size:30px; margin-bottom:20px; }

.review-box{ background:rgba(255,255,255,0.08); padding:20px; border-radius:18px; margin-bottom:18px; font-size:22px; line-height:1.7; }

.practice-box{ padding-bottom:10px; text-align:left; background:rgba(255,255,255,0.06); padding:25px; border-radius:20px; margin-bottom:25px; }

.practice-box h3{ font-size:28px; margin-bottom:12px; color:#38bdf8; }

.practice-box p{ font-size:24px; line-height:1.8; margin-bottom:20px; }

.practice-answer{ color:#22c55e; font-weight:700; }

.practice-note{ background:rgba(56,189,248,0.15); padding:18px; border-radius:16px; font-size:22px; line-height:1.7; }

@media(max-width:768px){ .top-bar{ flex-wrap:nowrap; }

.mini-card{ max-width:48%; min-width:auto; padding:15px; }

.question{ font-size:34px !important; }

.option{ font-size:22px !important; padding:22px; }

.question-no{ font-size:24px; }

.mini-card h2{ font-size:32px; } }

</style>
</head>

</div>

  </div>  <div class="popup" id="popup">

  <button onclick="restartQuiz()">Restart Quiz</button>

let currentQuestion = 0;
let score = 0;
let wrong = 0;
let answered = false;
let wrongList = [];

const questionEl = document.getElementById('question');
const optionsEl = document.getElementById('options');
const scoreEl = document.getElementById('score');
const wrongScoreEl = document.getElementById('wrongScore');
const currentNoEl = document.getElementById('currentNo');

function loadQuestion(){
answered = false;

const q = questions[currentQuestion];
questionEl.innerText = q.question;
currentNoEl.innerText = currentQuestion + 1;

optionsEl.innerHTML = '';

q.options.forEach((option,index)=>{
const div = document.createElement('div');
div.classList.add('option');
div.innerText = option;

div.onclick = ()=> selectAnswer(div,index);

optionsEl.appendChild(div);
});
}

function selectAnswer(element,index){
if(answered) return;
answered = true;

const correct = questions[currentQuestion].answer;
const options = document.querySelectorAll('.option');

options.forEach((opt,i)=>{
if(i===correct){
opt.classList.add('correct');
}
});

if(index===correct){
score++;
scoreEl.innerText = score;
}else{
element.classList.add('wrong');
wrong++;
wrongScoreEl.innerText = wrong;

wrongList.push({
question: questions[currentQuestion].question,
correctAns: questions[currentQuestion].options[correct]
});
}
}

document.getElementById('nextBtn').addEventListener('click',()=>{
if(!answered){
alert('আগে একটি Answer নির্বাচন করুন');
return;
}

const current = questions[currentQuestion];
const correctAnswer = current.options[current.answer];

const practiceContent = document.getElementById('practiceContent');
practiceContent.innerHTML = `
<div class="practice-box">
<h3>📖 Question</h3>
<p>${current.question}</p>

<h3>✅ Correct Answer</h3>
<p class="practice-answer">${correctAnswer}</p>

<div class="practice-note">
এই প্রশ্নটি ভালোভাবে পড়ুন এবং Practice করুন।
</div>
</div>
`;

document.getElementById('popup').style.display='flex';
});

function closePopup(){
document.getElementById('popup').style.display='none';
currentQuestion++;

if(currentQuestion < questions.length){
loadQuestion();
}else{
showFinal();
}
}

function showFinal(){
document.getElementById('finalPopup').style.display='flex';

document.getElementById('finalRight').innerText = score;
document.getElementById('finalWrong').innerText = wrong;

const wrongQuestions = document.getElementById('wrongQuestions');
wrongQuestions.innerHTML='';

wrongList.forEach((item)=>{
const div = document.createElement('div');
div.classList.add('review-box');

div.innerHTML = `
<b>Q:</b> ${item.question}<br><br>
<b>✅ Correct Answer:</b> ${item.correctAns}
`;

wrongQuestions.appendChild(div);
});
}

function restartQuiz(){
location.reload();
}

loadQuestion();
</script></body>
